<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>독립운동가 테스트</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

h2 {
  margin-bottom: 30px;
}

.question {
  margin: 25px 0;
  font-size: 18px;
}

/* 선택 버튼 */
button.choice {
  display: block;
  width: 320px;
  margin: 6px auto;
  padding: 10px;
  text-align: left;
  cursor: pointer;
}

.selected {
  background-color: #333;
  color: #fff;
}

/* 결과 카드 */
#result img {
  width: 90%;
  max-width: 500px;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  margin-top: 30px;
}

/* 하단 버튼 */
#actions {
  margin-top: 20px;
}

</style>
</head>

<body>

<h2>나는 어떤 독립운동가였을까?</h2>

<div id="quiz"></div>

<button onclick="submit()">결과 보기</button>

<div id="result"></div>
<div id="actions"></div>

<script>

const questions = [
"Q1. 혼란 속, 당신 앞에 중요한 기록이 놓여 있다. 어떻게 하겠는가?",
"Q2. 위험을 감수하고 얻은 중요한 정보. 당신의 선택은?",
"Q3. 동료가 적에게 쫓기고 있다. 지금 당신의 행동은?",
"Q4. 계획에 없던 변수가 발생했다. 당신은 어떻게 대응하는가?",
"Q5. 모든 것이 무너질 수도 있는 마지막 순간. 당신이 지키려는 것은?"
];

const choices = [
["A. 조용히 기록을 남긴다","B. 사람들에게 알린다","C. 직접 행동에 나선다"],
["A. 숨기고 지킨다","B. 모두와 공유한다","C. 즉시 활용한다"],
["A. 상황을 지켜보며 판단한다","B. 주변 사람들을 모은다","C. 직접 뛰어들어 구한다"],
["A. 침착하게 분석한다","B. 협력해 해결한다","C. 빠르게 돌파한다"],
["A. 진실","B. 사람","C. 결과"]
];

let answers = [];

const map = [
  {A:["기록자","전략가"], B:["선동가","교육자"], C:["실행가","정보원"]},
  {A:["기록자","정보원"], B:["선동가","수호자"], C:["실행가","전략가"]},
  {A:["기록자","연결자"], B:["선동가","교육자"], C:["실행가","전략가"]},
  {A:["기록자","수호자"], B:["선동가","연결자"], C:["실행가","정보원"]},
  {A:["기록자","정보원"], B:["선동가","교육자"], C:["실행가","전략가"]}
];

// 👉 카드 이미지 그대로 사용
const imageMap = {
  기록자:"record.jpg",
  선동가:"fire.jpg",
  실행가:"run.jpg",
  정보원:"info.jpg",
  교육자:"teach.jpg",
  연결자:"connect.jpg",
  전략가:"plan.jpg",
  수호자:"guard.jpg"
};

const quizDiv = document.getElementById("quiz");

// 질문 생성
questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `
    <p>${q}</p>
    <button class="choice" onclick="select(${i}, 'A', this)">${choices[i][0]}</button>
    <button class="choice" onclick="select(${i}, 'B', this)">${choices[i][1]}</button>
    <button class="choice" onclick="select(${i}, 'C', this)">${choices[i][2]}</button>
  `;

  quizDiv.appendChild(div);
});

// 선택 처리
function select(qIndex, value, btn) {
  answers[qIndex] = value;

  const parent = btn.parentElement;
  const buttons = parent.querySelectorAll(".choice");

  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

// 결과 계산
function submit() {

  if (answers.length < 5) {
    alert("모든 질문에 답해주세요!");
    return;
  }

  let score = {
    기록자:0, 선동가:0, 실행가:0, 정보원:0,
    교육자:0, 연결자:0, 전략가:0, 수호자:0
  };

  answers.forEach((a,i)=>{
    map[i][a].forEach(t=>score[t]++);
  });

  let result = Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);

  showResult(result);
}

// 🎯 결과: 카드 이미지만 출력
function showResult(result) {
  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <img src="${imageMap[result]}">
  `;

  document.getElementById("actions").innerHTML = `
    <button onclick="restart()">다시하기</button>
  `;
}

// 다시하기
function restart() {
  location.reload();
}

</script>

</body>
</html>
