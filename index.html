<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>독립운동가 테스트</title>

<style>
/* =========================
   📱 모바일 최적화
========================= */

@media (max-width: 768px) {

  body {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  /* 커버 */
  #cover h1 {
    font-size: 20px;
    padding: 10px 14px;
  }

  #cover p {
    font-size: 14px;
  }

  #cover img {
    max-width: 95%;
    max-height: 50%;
  }

  /* 퀴즈 영역 */
  #quizPage {
    padding: 12px;
  }

  h2 {
    font-size: 18px;
  }

  /* 질문 간격 줄이기 */
  .question {
    margin: 18px 0;
  }

  .question p {
    font-size: 15px;
    line-height: 1.4;
  }

  /* 버튼 최적화 (핵심) */
  button.choice {
    width: 95%;
    max-width: none;
    font-size: 15px;
    padding: 14px;
    margin: 8px auto;
    border-radius: 10px;
  }

  /* 결과 이미지 */
  #result img {
    width: 95%;
    max-width: 100%;
    margin-top: 20px;
  }

  /* 결과 버튼 */
  #actions button {
    width: 90%;
    font-size: 16px;
    padding: 14px;
  }
}

/* =========================
   📲 터치 UX 개선
========================= */

button {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

button.choice:active {
  transform: scale(0.98);
  transition: 0.1s;
}
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

/* 커버 */
#cover {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

#cover img {
  max-width: 90%;
  max-height: 60%;
  object-fit: contain;
}

#cover h1 {
  font-size: 28px;
  background: rgba(0,0,0,0.5);
  padding: 12px 20px;
  border-radius: 10px;
}

#cover p {
  margin-top: 15px;
  font-size: 16px;
  background: rgba(0,0,0,0.5);
  padding: 8px 14px;
  border-radius: 8px;
}

/* 퀴즈 */
#quizPage {
  display: none;
  padding: 20px;
}

.question {
  margin: 25px 0;
}

button.choice {
  display: block;
  width: 320px;
  margin: 6px auto;
  padding: 10px;
  text-align: left;
  cursor: pointer;
  border-radius: 6px;
  border: none;
}

.selected {
  background-color: #444;
  color: #fff;
}

#result img {
  width: 90%;
  max-width: 500px;
  margin-top: 30px;
  border-radius: 12px;
}

#actions button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- 커버 -->
<div id="cover">
  <img src="cover.jpg">
  <h1>전생에 나는 어떤 독립운동가였을까?</h1>
  <p>화면을 클릭하면 시작됩니다 ▶</p>
</div>

<!-- 퀴즈 -->
<div id="quizPage">
  <h2>나는 어떤 독립운동가였을까?</h2>

  <div id="quiz"></div>
  <button onclick="submit()">결과 보기</button>

  <div id="result"></div>
  <div id="actions"></div>
</div>

<script>
(() => {

  "use strict";

  /* =====================
     데이터
  ===================== */

const questions = [
"Q1. 혼란 속, 아무도 눈치채지 못한 중요한 기록을 발견했다. 당신의 첫 반응은?",
"Q2. 목숨을 걸고 얻은 결정적인 정보. 지금 이 순간, 당신의 선택은?",
"Q3. 동료가 적에게 쫓기고 있다. 지금 당신의 행동은?",
"Q4. 계획에 없던 변수가 발생했다. 당신은 어떻게 대응하는가?",
"Q5. 모든 것이 무너질 수도 있는 마지막 순간. 당신이 지키려는 것은?"
];

const choices = [
[
"A. 아무도 모르게, 조용히 기록으로 남긴다",
"B. 이 사실을 반드시 알려야 한다고 판단한다",
"C. 상황을 바꾸기 위해 즉시 움직인다"
],
[
"A. 끝까지 숨겨 지켜낸다",
"B. 위험을 감수하고 모두에게 공개한다",
"C. 지금 당장 전략적으로 활용한다"
],
[
"A. 상황을 지켜보며 타이밍을 본다",
"B. 주변 사람들을 모아 함께 대응한다",
"C. 망설임 없이 뛰어들어 구한다"
],
[
"A. 침착하게 분석하며 해결책을 찾는다",
"B. 동료들과 협력해 해결한다",
"C. 빠르게 돌파한다"
],
[
"A. 어떤 일이 있어도 ‘진실’",
"B. 끝까지 지켜야 할 ‘사람’",
"C. 반드시 만들어낼 ‘결과’"
]
];

  const map = [
    {A:"I", B:"E", C:"P"},
    {A:"S", B:"T", C:"A"},
    {A:"J", B:"T", C:"P"},
    {A:"J", B:"T", C:"P"},
    {A:"V", B:"T", C:"R"}
  ];

  const imageMap = {
    기록자:"record.jpg",
    선동가:"fire.jpg",
    실행가:"run.jpg",
    정보원:"info.jpg",
    교육자:"teach.jpg",
    연결자:"connect.jpg",
    전략가:"plan.jpg",
    수호자:"guard.jpg"
  };

  /* =====================
     상태
  ===================== */

  const answers = [];

  const trait = {
    I:0, E:0,
    S:0, A:0,
    J:0, P:0,
    T:0,
    V:0, R:0
  };

  /* =====================
     DOM 로딩 안전 처리
  ===================== */

  document.addEventListener("DOMContentLoaded", init);

  function init() {
    renderQuestions();
    bindEvents();
  }

  /* =====================
     시작
  ===================== */

  function bindEvents() {
    document.getElementById("cover")
      .addEventListener("click", startTest);
  }

  function startTest() {
    document.getElementById("cover").style.display = "none";
    document.getElementById("quizPage").style.display = "block";
  }

  /* =====================
     질문 렌더링
  ===================== */

  function renderQuestions() {
    const quizDiv = document.getElementById("quiz");
    if (!quizDiv) return;

    questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";

      div.innerHTML = `
        <p>${q}</p>
        <button class="choice" data-i="${i}" data-v="A">${choices[i][0]}</button>
        <button class="choice" data-i="${i}" data-v="B">${choices[i][1]}</button>
        <button class="choice" data-i="${i}" data-v="C">${choices[i][2]}</button>
      `;

      quizDiv.appendChild(div);
    });

    quizDiv.addEventListener("click", handleSelect);
  }

  /* =====================
     선택 처리 (이벤트 위임)
  ===================== */

  function handleSelect(e) {
    const btn = e.target;
    if (!btn.classList.contains("choice")) return;

    const i = Number(btn.dataset.i);
    const v = btn.dataset.v;

    answers[i] = v;

    const parent = btn.parentElement;
    parent.querySelectorAll(".choice")
      .forEach(b => b.classList.remove("selected"));

    btn.classList.add("selected");
  }

  /* =====================
     제출
  ===================== */

  window.submit = function () {

    const validCount = answers.filter(v => v).length;

    if (validCount < 5) {
      alert("모든 질문에 답해주세요!");
      return;
    }

    // 초기화
    for (let k in trait) trait[k] = 0;

    // 점수 계산
    answers.forEach((a, i) => {
      if (a && map[i][a]) {
        trait[map[i][a]]++;
      }
    });

    calculateResult();
  };

  function calculateResult() {

    const code =
      (trait.I >= trait.E ? "I" : "E") +
      (trait.S >= trait.A ? "S" : "A") +
      (trait.J >= trait.P ? "J" : "P") +
      (trait.T >= 2 ? "T" : "F") +
      (trait.V >= trait.R ? "V" : "R");

    matchType(code);
  }

  function matchType(code) {

    let result = "수호자";

    if (code.includes("I") && code.includes("J")) result = "기록자";
    else if (code.includes("E") && code.includes("T")) result = "선동가";
    else if (code.includes("P") && code.includes("R")) result = "실행가";
    else if (code.includes("I") && code.includes("S")) result = "정보원";
    else if (code.includes("T") && code.includes("V")) result = "교육자";
    else if (code.includes("E") && code.includes("V")) result = "연결자";
    else if (code.includes("J") && code.includes("A")) result = "전략가";

    showResult(result);
  }

  function showResult(result) {

    document.getElementById("quiz").style.display = "none";

    document.getElementById("result").innerHTML =
      `<img src="${imageMap[result]}">`;

    document.getElementById("actions").innerHTML =
      `<button onclick="location.reload()">다시하기</button>`;
  }

})();
</script>

</body>
</html>
